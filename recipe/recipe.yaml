schema_version: 1

context:
  name: tldraw
  version: "5.1.1"
  python_min: "3.13"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/tldraw-${{ version }}.tar.gz
  sha256: d964142b8bca3b6aed2358338105bacb7e580509764998dee6e1ce5e000643e8

build:
  number: 0
  noarch: python
  script:
    - rm -rf node_modules
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - hatch-jupyter-builder
    - pip
    - nodejs
  run:
    - python >=${{ python_min }}
    - anywidget
    - ipykernel
    - marimo >=0.23.8

tests:
  - python:
      imports:
        - tldraw
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Tldraw whiteboard functionality for Jupyter
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/kolibril13/jupyter-tldraw

extra:
  recipe-maintainers:
    - thewchan
